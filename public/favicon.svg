<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFE082" />
      <stop offset="50%" stop-color="#D4AF37" />
      <stop offset="100%" stop-color="#8A6D3B" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Dark aesthetic background -->
  <rect width="512" height="512" rx="128" fill="#0C0C0C" />
  <!-- Golden circular boundary -->
  <circle cx="256" cy="256" r="210" fill="none" stroke="url(#gold-grad)" stroke-width="12" stroke-dasharray="15 10" opacity="0.3" />
  <!-- Center symbol: Elegant geometric interconnected nodes 'M' for MoneyMind -->
  <g filter="url(#glow)">
    <!-- Main outer shape: Hexagon of nodes representing smart networks -->
    <polygon points="256,120 380,192 380,336 256,408 132,336 132,192" fill="none" stroke="url(#gold-grad)" stroke-width="8" stroke-linejoin="round" opacity="0.5" />
    <!-- Dynamic 'M' shape in the center -->
    <path d="M 160,320 L 160,200 L 256,290 L 352,200 L 352,320" fill="none" stroke="url(#gold-grad)" stroke-width="24" stroke-linecap="round" stroke-linejoin="round" />
    <!-- Pulse glowing core node at center top -->
    <circle cx="256" cy="190" r="16" fill="#FFFFFF" />
    <circle cx="256" cy="190" r="28" fill="#FFE082" opacity="0.4" />
    <!-- Left & Right active network nodes -->
    <circle cx="160" cy="200" r="12" fill="url(#gold-grad)" />
    <circle cx="352" cy="200" r="12" fill="url(#gold-grad)" />
    <circle cx="160" cy="320" r="12" fill="url(#gold-grad)" />
    <circle cx="352" cy="320" r="12" fill="url(#gold-grad)" />
    <circle cx="256" cy="290" r="12" fill="url(#gold-grad)" />
  </g>
</svg>
